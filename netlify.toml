[build]
  # Clear stale .netlify (e.g. edge-functions) so plugin doesn't fail on webpack-runtime.js.
  # NEXT_DISABLE_NETLIFY_EDGE avoids Edge middleware; clean avoids cached Edge artifacts.
  command = "node -e \"try{require('fs').rmSync('.netlify',{recursive:true,force:true})}catch(e){}; require('child_process').execSync('npm run build', {stdio:'inherit', env:process.env})\""

[build.environment]
  NEXT_DISABLE_NETLIFY_EDGE = "true"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Function timeout: set in Netlify UI (Site settings > Functions) or contact support.
# Max is 26s for sync functions. HEART AI setup uses a background function (netlify/functions/heart-setup-background.ts) for 15 min limit.
# Env: NETLIFY_HEART_SETUP_SECRET, NETLIFY_URL (or URL).

# Important: Don't cache auth routes
[[headers]]
  for = "/auth/*"
  [headers.values]
    Cache-Control = "no-store, no-cache, must-revalidate"
