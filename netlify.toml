[build]
  # Next + OpenNext: publish dir must be explicit in repo so builds do not depend on Netlify UI
  # ("Build settings → Publish directory"). Matches Netlify’s Next starter; overrides dashboard-only values.
  publish = ".next"
  # Clear stale .netlify (e.g. edge-functions) so plugin doesn't fail on webpack-runtime.js.
  # NEXT_DISABLE_NETLIFY_EDGE avoids Edge middleware; clean avoids cached Edge artifacts.
  # strip-sharp-from-traces.js removes Sharp/@img from NFT traces (Next still traces them despite
  # images.unoptimized); netlify-plugin-slim-handler trims the assembled handler on Linux (~40 MB).
  command = "node -e \"try{require('fs').rmSync('.netlify',{recursive:true,force:true})}catch(e){}; require('child_process').execSync('npm run build', {stdio:'inherit', env:process.env}); require('child_process').execSync('node scripts/strip-sharp-from-traces.js', {stdio:'inherit', env:process.env})\""

[build.environment]
  NEXT_DISABLE_NETLIFY_EDGE = "true"
  AWS_LAMBDA_JS_RUNTIME = "nodejs20.x"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Runs after @netlify/plugin-nextjs to remove Sharp/libvips from the assembled handler.
[[plugins]]
  package = "./netlify-plugin-slim-handler"

# Function timeout: set in Netlify UI (Site settings > Functions) or contact support.
# Max is 26s for sync functions. HEART AI setup uses a background function (netlify/functions/heart-setup-background.ts) for 15 min limit.
# Env: NETLIFY_HEART_SETUP_SECRET, NETLIFY_URL (or URL).

# Important: Don't cache auth routes
[[headers]]
  for = "/auth/*"
  [headers.values]
    Cache-Control = "no-store, no-cache, must-revalidate"

# AI Chief of Staff API — read-only REST endpoints for 1:1 prep packs
[[redirects]]
  from = "/api/v1/team-members"
  to = "/.netlify/functions/v1-team-members"
  status = 200

[[redirects]]
  from = "/api/v1/team-members/:id/epics"
  to = "/.netlify/functions/v1-team-member-epics?id=:id"
  status = 200

[[redirects]]
  from = "/api/v1/team-members/:id/blockers"
  to = "/.netlify/functions/v1-team-member-blockers?id=:id"
  status = 200

[[redirects]]
  from = "/api/v1/1on1-prep/:person_id"
  to = "/.netlify/functions/v1-1on1-prep?person_id=:person_id"
  status = 200

[[redirects]]
  from = "/api/v1/epics/:id"
  to = "/.netlify/functions/v1-epic?id=:id"
  status = 200
