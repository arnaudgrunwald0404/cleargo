name: RRV → ClearGo Bulk Import (one-shot cutover)

# Dispatch-only. Wraps scripts/rrv-import/{01..04}.* on a clean Ubuntu runner so
# we don't depend on any operator having psql/pg_dump locally. The destination
# project ref must be typed in confirm_project_ref to catch wrong-secret mistakes.
#
# Required repo secrets:
#   RRV_DATABASE_URL       — postgres://… for the RRV Supabase project (read-only side)
#   CLEARGO_DATABASE_URL   — postgres://… for the ClearGo Supabase project to write into
#                            (operator swaps between dev and production values between runs)
#
# Optional repo configuration:
#   Environment named `rrv-import` with a "Required reviewers" protection rule
#   gates the `insert` job behind a manual approval click before any writes happen.

on:
  workflow_dispatch:
    inputs:
      confirm_project_ref:
        description: 'Destination project ref (e.g. zgmlspqannohbhbdoakb). Must match the host in CLEARGO_DATABASE_URL.'
        required: true
        type: string
      do_insert:
        description: 'Perform the actual INSERT after dry-run? Choose false first, review the report, then re-run with true.'
        required: true
        default: 'false'
        type: choice
        options: ['false', 'true']
      drop_staging:
        description: 'Drop the rrv_import staging schema after a successful insert.'
        required: true
        default: 'true'
        type: choice
        options: ['true', 'false']

concurrency:
  # Never run two imports against the same project at the same time.
  group: rrv-bulk-import-${{ inputs.confirm_project_ref }}
  cancel-in-progress: false

jobs:
  dry_run:
    name: Dump RRV → stage in ${{ inputs.confirm_project_ref }} → reconcile (dry run)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      artifact_name: ${{ steps.meta.outputs.artifact_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install PostgreSQL 17 client
        run: |
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc \
            -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc
          echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" \
            | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends postgresql-client-17
          psql --version
          pg_dump --version

      - name: Verify destination URL matches confirm_project_ref
        env:
          CLEARGO_SUPABASE_DB_URL: ${{ secrets.CLEARGO_DATABASE_URL }}
          REF: ${{ inputs.confirm_project_ref }}
        run: |
          if [ -z "${CLEARGO_SUPABASE_DB_URL:-}" ]; then
            echo "::error::CLEARGO_DATABASE_URL secret is not set."
            exit 1
          fi
          if [ -z "${REF:-}" ]; then
            echo "::error::confirm_project_ref input is empty."
            exit 1
          fi
          # Match db.<ref>.supabase.co OR aws-*.pooler.supabase.com?…project=<ref>
          if ! echo "$CLEARGO_SUPABASE_DB_URL" | grep -qE "(\b${REF}\b|/${REF}\b)"; then
            echo "::error::Project ref '${REF}' not found in CLEARGO_DATABASE_URL host. Refusing to proceed."
            exit 1
          fi
          echo "Destination ref verified: ${REF}"

      - name: Verify RRV URL secret is set
        env:
          RRV_SUPABASE_DB_URL: ${{ secrets.RRV_DATABASE_URL }}
        run: |
          if [ -z "${RRV_SUPABASE_DB_URL:-}" ]; then
            echo "::error::RRV_DATABASE_URL secret is not set."
            exit 1
          fi
          # Don't echo the URL — just confirm presence.
          echo "RRV_DATABASE_URL is present (length: ${#RRV_SUPABASE_DB_URL})."

      - name: Compute artifact name
        id: meta
        run: |
          STAMP="$(date -u +%Y%m%dT%H%M%SZ)"
          NAME="rrv-import-${{ inputs.confirm_project_ref }}-${STAMP}"
          echo "artifact_name=${NAME}" >> "$GITHUB_OUTPUT"
          echo "ARTIFACT_NAME=${NAME}" >> "$GITHUB_ENV"

      - name: 01 — pg_dump RRV
        env:
          RRV_SUPABASE_DB_URL: ${{ secrets.RRV_DATABASE_URL }}
          OUT_DIR: ./tmp/rrv-import
        run: |
          chmod +x scripts/rrv-import/01-export-from-rrv.sh
          bash scripts/rrv-import/01-export-from-rrv.sh

      - name: 02 — Stage into rrv_import schema
        env:
          CLEARGO_SUPABASE_DB_URL: ${{ secrets.CLEARGO_DATABASE_URL }}
          OUT_DIR: ./tmp/rrv-import
        run: |
          chmod +x scripts/rrv-import/02-stage-into-cleargo.sh
          bash scripts/rrv-import/02-stage-into-cleargo.sh | tee tmp/rrv-import/stage.log

      - name: 03 — Reconcile (dry run)
        env:
          CLEARGO_SUPABASE_DB_URL: ${{ secrets.CLEARGO_DATABASE_URL }}
        run: |
          psql "$CLEARGO_SUPABASE_DB_URL" \
            -v ON_ERROR_STOP=1 \
            -f scripts/rrv-import/03-reconcile-and-insert.sql \
            | tee tmp/rrv-import/reconcile-dry-run.log

      - name: Upload import artifact (dump + logs)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.artifact_name }}
          path: tmp/rrv-import/
          retention-days: 30
          if-no-files-found: error

      - name: Summary
        run: |
          {
            echo "## RRV → ClearGo dry run complete"
            echo
            echo "**Destination project:** \`${{ inputs.confirm_project_ref }}\`"
            echo "**Insert requested:** \`${{ inputs.do_insert }}\`"
            echo "**Artifact:** \`${{ steps.meta.outputs.artifact_name }}\`"
            echo
            echo "### Staging counts"
            echo '```'
            tail -n 30 tmp/rrv-import/stage.log || true
            echo '```'
            echo
            echo "### Reconcile (dry run) tail"
            echo '```'
            tail -n 60 tmp/rrv-import/reconcile-dry-run.log || true
            echo '```'
            if [ "${{ inputs.do_insert }}" = "true" ]; then
              echo
              echo "Proceeding to **insert** job (gated by the \`rrv-import\` GitHub Environment if configured)."
            else
              echo
              echo "Dry run only. Re-run this workflow with \`do_insert = true\` to perform the inserts."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  insert:
    name: Insert into public schema + parity check
    needs: dry_run
    if: ${{ inputs.do_insert == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # OPTIONAL approval gate: create a GitHub Environment named `rrv-import`
    # in repo Settings → Environments with "Required reviewers" set, then
    # uncomment the line below. The job will pause for manual approval before
    # any writes hit the destination.
    # environment: rrv-import
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install PostgreSQL 17 client
        run: |
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc \
            -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc
          echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" \
            | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends postgresql-client-17

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Download dry-run artifact (dump + staging logs)
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.dry_run.outputs.artifact_name }}
          path: tmp/rrv-import/

      - name: Re-verify destination URL still matches confirm_project_ref
        env:
          CLEARGO_SUPABASE_DB_URL: ${{ secrets.CLEARGO_DATABASE_URL }}
          REF: ${{ inputs.confirm_project_ref }}
        run: |
          if ! echo "$CLEARGO_SUPABASE_DB_URL" | grep -qE "(\b${REF}\b|/${REF}\b)"; then
            echo "::error::CLEARGO_DATABASE_URL no longer matches '${REF}' — was the secret swapped between jobs? Aborting."
            exit 1
          fi

      - name: 03 — Reconcile + INSERT
        env:
          CLEARGO_SUPABASE_DB_URL: ${{ secrets.CLEARGO_DATABASE_URL }}
        run: |
          psql "$CLEARGO_SUPABASE_DB_URL" \
            -v ON_ERROR_STOP=1 \
            -v rrv_import_do_insert=1 \
            -f scripts/rrv-import/03-reconcile-and-insert.sql \
            | tee tmp/rrv-import/reconcile-insert.log

      - name: 04 — Parity spot-check (20 random aha_keys)
        env:
          RRV_SUPABASE_DB_URL: ${{ secrets.RRV_DATABASE_URL }}
          CLEARGO_SUPABASE_DB_URL: ${{ secrets.CLEARGO_DATABASE_URL }}
          SAMPLE_SIZE: '20'
        run: |
          node scripts/rrv-import/04-parity-check.mjs | tee tmp/rrv-import/parity-check.log

      - name: Drop staging schema
        if: ${{ inputs.drop_staging == 'true' }}
        env:
          CLEARGO_SUPABASE_DB_URL: ${{ secrets.CLEARGO_DATABASE_URL }}
        run: |
          psql "$CLEARGO_SUPABASE_DB_URL" -v ON_ERROR_STOP=1 \
            -c 'DROP SCHEMA IF EXISTS rrv_import CASCADE;' \
            | tee tmp/rrv-import/drop-staging.log

      - name: Upload final logs
        uses: actions/upload-artifact@v4
        with:
          name: ${{ needs.dry_run.outputs.artifact_name }}-insert
          path: |
            tmp/rrv-import/reconcile-insert.log
            tmp/rrv-import/parity-check.log
            tmp/rrv-import/drop-staging.log
          retention-days: 90
          if-no-files-found: warn

      - name: Summary
        run: |
          {
            echo "## RRV → ClearGo INSERT complete"
            echo
            echo "**Destination project:** \`${{ inputs.confirm_project_ref }}\`"
            echo "**Staging dropped:** \`${{ inputs.drop_staging }}\`"
            echo
            echo "### Final destination row counts"
            echo '```'
            tail -n 25 tmp/rrv-import/reconcile-insert.log || true
            echo '```'
            echo
            echo "### Parity spot-check"
            echo '```'
            tail -n 30 tmp/rrv-import/parity-check.log || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
