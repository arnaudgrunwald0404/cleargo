name: Daily Retro Reminders

on:
  schedule:
    # Daily at 9:00 AM America/New_York (13:00 UTC, or 14:00 UTC during DST)
    # Using 13:00 UTC as a safe default (covers both EST and EDT)
    - cron: '0 13 * * *'
  workflow_dispatch: {}

jobs:
  send-reminders:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger retro reminders
        env:
          BASE_URL: ${{ secrets.APP_BASE_URL || secrets.NEXT_PUBLIC_APP_URL || 'https://cleargo.netlify.app' }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$BASE_URL" ]; then
            echo "APP_BASE_URL or NEXT_PUBLIC_APP_URL secret not set" >&2
            exit 1
          fi
          if [ -z "$CRON_SECRET" ]; then
            echo "CRON_SECRET secret not set" >&2
            exit 1
          fi
          echo "Triggering daily retro reminders..."
          for i in 1 2 3; do
            STATUS=$(curl -sS -o response.json -w "%{http_code}" \
              -H "Authorization: Bearer $CRON_SECRET" \
              "$BASE_URL/api/jobs/retro-reminders") || true
            echo "HTTP $STATUS"
            cat response.json || true
            if [ "$STATUS" = "200" ]; then 
              echo "Retro reminders sent successfully"
              exit 0
            fi
            echo "Retry $i..."; sleep 10
          done
          echo "Failed after retries" >&2
          exit 1
