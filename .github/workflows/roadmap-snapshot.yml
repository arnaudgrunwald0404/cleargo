name: Roadmap Snapshot

on:
  schedule:
    # Mondays 08:00 UTC — weekly Aha! pivot ingest (aligned with legacy n8n cadence)
    - cron: '0 8 * * 1'
  workflow_dispatch: {}

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger roadmap snapshot job
        env:
          BASE_URL: ${{ secrets.APP_BASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$BASE_URL" ]; then
            echo "APP_BASE_URL secret not set" >&2
            exit 1
          fi
          if [ -z "$CRON_SECRET" ]; then
            echo "CRON_SECRET secret not set" >&2
            exit 1
          fi
          for i in 1 2 3; do
            STATUS=$(curl -sS -o response.json -w "%{http_code}" \
              -H "Authorization: Bearer $CRON_SECRET" \
              "$BASE_URL/api/jobs/roadmap-snapshot") || true
            echo "HTTP $STATUS"
            cat response.json || true
            if [ "$STATUS" = "200" ]; then exit 0; fi
            echo "Retry $i..."; sleep 10
          done
          echo "Failed after retries" >&2
          exit 1
