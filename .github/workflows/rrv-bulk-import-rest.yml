name: RRV → ClearGo Bulk Import (REST / service-role)

# Dispatch-only. Runs scripts/rrv-import/local-import.mjs against the ClearGo
# Supabase project that owns CLEARGO_SUPABASE_SERVICE_ROLE_KEY using
# service-role keys over HTTPS.
#
# Why a separate workflow from rrv-bulk-import.yml?
#   The pg_dump-based workflow needs DB passwords, the Postgres pooler, and
#   IPv4 connectivity — all of which have been brittle. This one uses the
#   `@supabase/supabase-js` REST client + service-role JWTs, the same path
#   that already works locally via `npm run rrv-import:local`.
#
# Required repo secrets (set once, never type at runtime):
#   RRV_SUPABASE_SERVICE_ROLE_KEY      — service_role JWT for the RRV project
#   CLEARGO_SUPABASE_SERVICE_ROLE_KEY  — service_role JWT for the destination
#                                         ClearGo project
#
# Both Supabase URLs and project refs are derived from the JWTs' `ref` claim —
# nothing to type, nothing to confirm. The decoded refs are printed in the
# step summary so you can see exactly which projects each run touched.

on:
  workflow_dispatch:
    inputs:
      do_insert:
        description: 'Actually write to ClearGo? Leave as false for a dry-run. Re-run with true after reviewing the diagnostics.'
        required: true
        default: 'false'
        type: choice
        options: ['false', 'true']

concurrency:
  # Never run two imports at the same time.
  group: rrv-bulk-import-rest
  cancel-in-progress: false

jobs:
  import:
    name: ${{ inputs.do_insert == 'true' && 'Dry-run + INSERT' || 'Dry-run only' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install deps
        run: npm ci --no-audit --no-fund --prefer-offline

      - name: Verify both service-role keys are set + show project refs
        env:
          RRV_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.RRV_SUPABASE_SERVICE_ROLE_KEY }}
          CLEARGO_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.CLEARGO_SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          if [ -z "${RRV_SUPABASE_SERVICE_ROLE_KEY:-}" ]; then
            echo "::error::RRV_SUPABASE_SERVICE_ROLE_KEY secret is not set."
            exit 1
          fi
          if [ -z "${CLEARGO_SUPABASE_SERVICE_ROLE_KEY:-}" ]; then
            echo "::error::CLEARGO_SUPABASE_SERVICE_ROLE_KEY secret is not set."
            exit 1
          fi

          # Decode `ref` claim from each JWT for visibility (no signature check).
          decode_ref() {
            local token="$1"
            local payload=$(echo "$token" | cut -d'.' -f2)
            local pad=$(( 4 - ${#payload} % 4 ))
            if [ $pad -lt 4 ]; then payload="${payload}$(printf '=%.0s' $(seq 1 $pad))"; fi
            echo "$payload" | tr '_-' '/+' | base64 -d 2>/dev/null \
              | python3 -c "import sys,json;print(json.load(sys.stdin).get('ref',''))" 2>/dev/null
          }

          RRV_REF=$(decode_ref "$RRV_SUPABASE_SERVICE_ROLE_KEY")
          CG_REF=$(decode_ref "$CLEARGO_SUPABASE_SERVICE_ROLE_KEY")

          if [ -z "$RRV_REF" ]; then
            echo "::error::Could not decode project ref from RRV_SUPABASE_SERVICE_ROLE_KEY. Is the secret a valid Supabase JWT?"
            exit 1
          fi
          if [ -z "$CG_REF" ]; then
            echo "::error::Could not decode project ref from CLEARGO_SUPABASE_SERVICE_ROLE_KEY. Is the secret a valid Supabase JWT?"
            exit 1
          fi

          echo "Source (RRV):     $RRV_REF (https://$RRV_REF.supabase.co)"
          echo "Target (ClearGo): $CG_REF (https://$CG_REF.supabase.co)"
          echo "RRV_REF=$RRV_REF" >> "$GITHUB_ENV"
          echo "CG_REF=$CG_REF" >> "$GITHUB_ENV"

      - name: Run import (dry-run only)
        if: ${{ inputs.do_insert != 'true' }}
        env:
          RRV_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.RRV_SUPABASE_SERVICE_ROLE_KEY }}
          CLEARGO_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.CLEARGO_SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          mkdir -p tmp/rrv-import
          node scripts/rrv-import/local-import.mjs 2>&1 | tee tmp/rrv-import/import.log

      - name: Run import (dry-run + INSERT)
        if: ${{ inputs.do_insert == 'true' }}
        env:
          RRV_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.RRV_SUPABASE_SERVICE_ROLE_KEY }}
          CLEARGO_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.CLEARGO_SUPABASE_SERVICE_ROLE_KEY }}
          DO_INSERT: 'true'
        run: |
          mkdir -p tmp/rrv-import
          node scripts/rrv-import/local-import.mjs --do-insert 2>&1 | tee tmp/rrv-import/import.log

      - name: Upload import log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rrv-rest-import-${{ env.CG_REF }}-${{ github.run_id }}
          path: tmp/rrv-import/
          retention-days: 30
          if-no-files-found: warn

      - name: Step summary
        if: always()
        run: |
          {
            echo "## RRV → ClearGo import (${{ inputs.do_insert == 'true' && 'INSERT' || 'dry-run' }})"
            echo
            echo "**Source (RRV):** \`${RRV_REF}\`"
            echo "**Target (ClearGo):** \`${CG_REF}\`"
            echo "**Mode:** ${{ inputs.do_insert == 'true' && 'INSERT (writes to public.*)' || 'dry-run only (no writes)' }}"
            echo
            echo "### Last 80 lines of script output"
            echo '```'
            tail -n 80 tmp/rrv-import/import.log 2>/dev/null || echo "(no log file)"
            echo '```'
            if [ "${{ inputs.do_insert }}" != "true" ]; then
              echo
              echo "Dry-run only. If the diagnostics look right, **re-run with \`do_insert = true\`** to perform the inserts."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
